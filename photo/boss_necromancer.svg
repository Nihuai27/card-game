<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>

  <!-- 死灵法师 - 操控死亡的法师！ -->
  <!-- 长袍 -->
  <rect x="28" y="45" width="44" height="45" fill="#0d0d1a"/>
  <rect x="33" y="52" width="34" height="35" fill="#1a1a2e"/>

  <!-- 长袍装饰 -->
  <rect x="48" y="55" width="4" height="25" fill="#4a0080"/>
  <rect x="40" y="65" width="6" height="6" fill="#9400d3"/>
  <rect x="54" y="65" width="6" height="6" fill="#9400d3"/>

  <!-- 头部 -->
  <rect x="36" y="22" width="28" height="28" fill="#f5f5dc"/>
  <rect x="38" y="26" width="24" height="20" fill="#fff"/>

  <!-- 眼窝 - 黑暗 -->
  <rect x="42" y="32" width="5" height="5" fill="#000"/>
  <rect x="53" y="32" width="5" height="5" fill="#000"/>
  <rect x="44" y="33" width="2" height="2" fill="#9400d3"/>
  <rect x="55" y="33" width="2" height="2" fill="#9400d3"/>

  <!-- 兜帽 -->
  <path d="M34 24 Q50 8 66 24 L62 34 L38 34 Z" fill="#0d0d1a"/>
  <rect x="34" y="30" width="32" height="8" fill="#1a1a2e"/>

  <!-- 骷髅法杖 -->
  <rect x="78" y="25" width="4" height="55" fill="#4a4a4a"/>
  <rect x="74" y="20" width="12" height="12" fill="#f5f5dc"/>
  <rect x="76" y="22" width="3" height="3" fill="#000"/>
  <rect x="81" y="22" width="3" height="3" fill="#000"/>
  <rect x="78" y="27" width="4" height="3" fill="#000"/>

  <!-- 死亡魔法效果 -->
  <circle cx="80" cy="22" r="10" fill="none" stroke="#9400d3" stroke-width="2" opacity="0.6"/>
  <circle cx="80" cy="22" r="14" fill="none" stroke="#4a0080" stroke-width="1" opacity="0.4"/>

  <!-- 幽灵效果 -->
  <rect x="15" y="35" width="4" height="4" fill="#9400d3" opacity="0.6"/>
  <rect x="12" y="55" width="3" height="3" fill="#4a0080" opacity="0.5"/>
  <rect x="18" y="70" width="4" height="4" fill="#9400d3" opacity="0.6"/>
  <rect x="85" y="45" width="3" height="3" fill="#4a0080" opacity="0.5"/>

  <!-- 袖子 -->
  <rect x="22" y="50" width="12" height="22" fill="#0d0d1a"/>
  <rect x="66" y="50" width="12" height="22" fill="#0d0d1a"/>

  <!-- 骷髅手 -->
  <rect x="20" y="68" width="6" height="8" fill="#f5f5dc"/>
  <rect x="74" y="68" width="6" height="8" fill="#f5f5dc"/>
</svg>