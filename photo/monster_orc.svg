<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  
  <!-- 兽人战士 - 强壮的绿皮怪物 -->
  <!-- 身体 -->
  <rect x="30" y="45" width="40" height="35" fill="#228b22"/>
  <rect x="35" y="50" width="30" height="25" fill="#32cd32"/>
  
  <!-- 头部 -->
  <rect x="35" y="22" width="30" height="28" fill="#228b22"/>
  <rect x="38" y="26" width="24" height="20" fill="#32cd32"/>
  
  <!-- 獠牙 -->
  <rect x="38" y="42" width="4" height="8" fill="#fff"/>
  <rect x="58" y="42" width="4" height="8" fill="#fff"/>
  
  <!-- 眼睛 - 黄色凶狠 -->
  <rect x="40" y="32" width="5" height="5" fill="#ffff00"/>
  <rect x="55" y="32" width="5" height="5" fill="#ffff00"/>
  <rect x="42" y="33" width="2" height="2" fill="#000"/>
  <rect x="57" y="33" width="2" height="2" fill="#000"/>
  
  <!-- 鼻子 -->
  <rect x="47" y="38" width="6" height="4" fill="#006400"/>
  
  <!-- 头盔 -->
  <rect x="32" y="18" width="36" height="8" fill="#4a4a4a"/>
  <rect x="35" y="20" width="30" height="4" fill="#696969"/>
  
  <!-- 肩甲 -->
  <rect x="22" y="48" width="12" height="15" fill="#4a4a4a"/>
  <rect x="66" y="48" width="12" height="15" fill="#4a4a4a"/>
  
  <!-- 武器 - 巨斧 -->
  <rect x="78" y="30" width="6" height="50" fill="#8b4513"/>
  <rect x="72" y="25" width="18" height="12" fill="#c0c0c0"/>
  <rect x="75" y="28" width="12" height="6" fill="#ff0000"/>
  
  <!-- 手臂 -->
  <rect x="22" y="55" width="12" height="18" fill="#228b22"/>
  <rect x="66" y="55" width="12" height="18" fill="#228b22"/>
  
  <!-- 腿部 -->
  <rect x="35" y="80" width="10" height="18" fill="#228b22"/>
  <rect x="55" y="80" width="10" height="18" fill="#228b22"/>
  
  <!-- 战靴 -->
  <rect x="32" y="95" width="16" height="5" fill="#4a4a4a"/>
  <rect x="52" y="95" width="16" height="5" fill="#4a4a4a"/>
</svg>