<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>

  <!-- 亡灵骑士 - 堕落的骑士 -->
  <!-- 身体/盔甲 -->
  <rect x="30" y="42" width="40" height="38" fill="#2d2d2d"/>
  <rect x="35" y="48" width="30" height="28" fill="#3d3d3d"/>

  <!-- 盔甲装饰 -->
  <rect x="48" y="52" width="4" height="20" fill="#4a0080"/>
  <rect x="42" y="58" width="16" height="4" fill="#4a0080"/>

  <!-- 头部/头盔 -->
  <rect x="36" y="20" width="28" height="26" fill="#2d2d2d"/>
  <rect x="38" y="24" width="24" height="18" fill="#3d3d3d"/>

  <!-- 眼睛 - 紫色灵魂火 -->
  <rect x="42" y="30" width="5" height="5" fill="#9400d3"/>
  <rect x="53" y="30" width="5" height="5" fill="#9400d3"/>
  <rect x="44" y="31" width="2" height="2" fill="#fff"/>
  <rect x="55" y="31" width="2" height="2" fill="#fff"/>

  <!-- 头盔角 -->
  <polygon points="36,22 30,8 38,20" fill="#1a1a1a"/>
  <polygon points="64,22 70,8 62,20" fill="#1a1a1a"/>

  <!-- 披风 -->
  <rect x="25" y="45" width="8" height="30" fill="#4a0080"/>
  <rect x="67" y="45" width="8" height="30" fill="#4a0080"/>

  <!-- 武器 - 死亡之剑 -->
  <rect x="78" y="25" width="5" height="50" fill="#4a0080"/>
  <rect x="76" y="20" width="9" height="10" fill="#9400d3"/>
  <rect x="78" y="22" width="5" height="6" fill="#fff"/>

  <!-- 灵魂火焰效果 -->
  <rect x="80" y="18" width="4" height="4" fill="#9400d3" opacity="0.8"/>
  <rect x="82" y="15" width="3" height="3" fill="#fff" opacity="0.6"/>

  <!-- 手臂 -->
  <rect x="22" y="52" width="14" height="12" fill="#2d2d2d"/>
  <rect x="64" y="52" width="14" height="12" fill="#2d2d2d"/>

  <!-- 腿部 -->
  <rect x="36" y="78" width="10" height="18" fill="#2d2d2d"/>
  <rect x="54" y="78" width="10" height="18" fill="#2d2d2d"/>

  <!-- 死亡气息 -->
  <rect x="15" y="35" width="4" height="4" fill="#9400d3" opacity="0.5"/>
  <rect x="12" y="65" width="3" height="3" fill="#4a0080" opacity="0.5"/>
  <rect x="85" y="70" width="4" height="4" fill="#9400d3" opacity="0.5"/>
</svg>