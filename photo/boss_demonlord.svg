<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>

  <!-- 恶魔领主 - 地狱的统治者！ -->
  <!-- 身体 -->
  <rect x="28" y="48" width="44" height="40" fill="#8b0000"/>
  <rect x="33" y="55" width="34" height="30" fill="#a52a2a"/>

  <!-- 肌肉线条 -->
  <rect x="38" y="62" width="6" height="12" fill="#6b0000"/>
  <rect x="56" y="62" width="6" height="12" fill="#6b0000"/>

  <!-- 头部 -->
  <rect x="35" y="22" width="30" height="30" fill="#8b0000"/>
  <rect x="38" y="26" width="24" height="22" fill="#a52a2a"/>

  <!-- 大角 -->
  <polygon points="32,28 20,5 38,24" fill="#2d2d2d"/>
  <polygon points="68,28 80,5 62,24" fill="#2d2d2d"/>
  <polygon points="34,26 25,12 36,24" fill="#4a4a4a"/>
  <polygon points="66,26 75,12 64,24" fill="#4a4a4a"/>

  <!-- 眼睛 - 燃烧的黄 -->
  <rect x="40" y="34" width="6" height="6" fill="#ffff00"/>
  <rect x="54" y="34" width="6" height="6" fill="#ffff00"/>
  <rect x="42" y="35" width="3" height="3" fill="#ff0000"/>
  <rect x="56" y="35" width="3" height="3" fill="#ff0000"/>

  <!-- 鼻孔 -->
  <rect x="46" y="44" width="3" height="3" fill="#000"/>
  <rect x="51" y="44" width="3" height="3" fill="#000"/>

  <!-- 獠牙 -->
  <rect x="40" y="48" width="4" height="8" fill="#fff"/>
  <rect x="56" y="48" width="4" height="8" fill="#fff"/>

  <!-- 翅膀 - 左翼 -->
  <path d="M28 55 L5 35 L10 60 Z" fill="#4a0000"/>
  <path d="M26 58 L8 45 L12 58 Z" fill="#6b0000"/>

  <!-- 翅膀 - 右翼 -->
  <path d="M72 55 L95 35 L90 60 Z" fill="#4a0000"/>
  <path d="M74 58 L92 45 L88 58 Z" fill="#6b0000"/>

  <!-- 武器 - 恶魔三叉戟 -->
  <rect x="82" y="30" width="4" height="50" fill="#2d2d2d"/>
  <rect x="76" y="25" width="16" height="6" fill="#4a4a4a"/>
  <rect x="78" y="20" width="3" height="10" fill="#2d2d2d"/>
  <rect x="85" y="20" width="3" height="10" fill="#2d2d2d"/>
  <rect x="82" y="18" width="4" height="8" fill="#ff0000"/>

  <!-- 火焰效果 -->
  <rect x="25" y="40" width="4" height="6" fill="#ff4500" opacity="0.8"/>
  <rect x="71" y="42" width="4" height="6" fill="#ff4500" opacity="0.8"/>
  <rect x="48" y="85" width="4" height="8" fill="#ff0000" opacity="0.7"/>

  <!-- 手臂 -->
  <rect x="20" y="58" width="12" height="18" fill="#8b0000"/>
  <rect x="68" y="58" width="12" height="18" fill="#8b0000"/>

  <!-- 爪子 -->
  <rect x="18" y="72" width="4" height="8" fill="#000"/>
  <rect x="78" y="72" width="4" height="8" fill="#000"/>

  <!-- 腿部 -->
  <rect x="35" y="88" width="10" height="10" fill="#8b0000"/>
  <rect x="55" y="88" width="10" height="10" fill="#8b0000"/>
</svg>