  <rect x="48" y="38" width="4" height="12" fill="#ff0000"/>
  <rect x="44" y="42" width="12" height="4" fill="#ff0000"/>
  
  <!-- 手臂 -->
  <rect x="20" y="48" width="12" height="16" fill="#696969"/>
  <rect x="68" y="48" width="12" height="16" fill="#696969"/>
  
  <!-- 巨剑 - 右手持 -->
  <rect x="82" y="20" width="6" height="50" fill="#c0c0c0"/>
