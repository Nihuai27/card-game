  <!-- 腿部 -->
  <rect x="38" y="56" width="10" height="24" fill="#4a4a6a"/>
  <rect x="52" y="56" width="10" height="24" fill="#4a4a6a"/>
  
  <!-- 靴子 -->
  <rect x="36" y="76" width="14" height="10" fill="#2f4f4f"/>
  <rect x="50" y="76" width="14" height="10" fill="#2f4f4f"/>
  <rect x="36" y="84" width="14" height="4" fill="#1a1a1a"/>
