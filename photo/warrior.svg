  <rect x="32" y="14" width="8" height="12" fill="#696969"/>
  <rect x="60" y="14" width="8" height="12" fill="#696969"/>
  
  <!-- 脸部 -->
  <rect x="40" y="16" width="20" height="16" fill="#fdbf60"/>
  <rect x="44" y="22" width="4" height="4" fill="#333"/>
  <rect x="52" y="22" width="4" height="4" fill="#333"/>
  <rect x="48" y="28" width="4" height="2" fill="#8b4513"/>
  
  <!-- 头盔装饰 -->
  <rect x="48" y="8" width="4" height="6" fill="#ff0000"/>
  
  <!-- 肩甲 -->
  <rect x="20" y="32" width="16" height="16" fill="#696969"/>
