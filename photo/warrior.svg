  <rect x="24" y="36" width="8" height="8" fill="#808080"/>
  <rect x="68" y="36" width="8" height="8" fill="#808080"/>
  
  <!-- 胸甲 -->
  <rect x="36" y="32" width="28" height="24" fill="#a9a9a9"/>
