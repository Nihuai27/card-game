<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  
  <!-- 法师 - 奥术魔法大师 -->
  <!-- 法师帽 -->
  <polygon points="50,5 30,22 70,22" fill="#4b0082"/>
  <rect x="28" y="20" width="44" height="6" fill="#663399" rx="1"/>
  <rect x="46" y="10" width="8" height="6" fill="#ffd700"/>
  
  <!-- 脸部 -->
  <rect x="40" y="26" width="20" height="16" fill="#fdbf60"/>
  <rect x="44" y="32" width="4" height="4" fill="#4169e1"/>
  <rect x="52" y="32" width="4" height="4" fill="#4169e1"/>
  <rect x="48" y="38" width="4" height="2" fill="#8b4513"/>
  
  <!-- 胡须 -->
  <rect x="44" y="40" width="12" height="4" fill="#ddd"/>
  <rect x="46" y="42" width="8" height="4" fill="#ddd"/>
  
  <!-- 长袍 -->
  <rect x="32" y="44" width="36" height="32" fill="#4b0082"/>
  <rect x="36" y="48" width="28" height="24" fill="#663399"/>
  
  <!-- 长袍装饰 -->
  <rect x="48" y="48" width="4" height="24" fill="#9370db"/>
  <rect x="40" y="56" width="6" height="6" fill="#ffd700"/>
  <rect x="54" y="56" width="6" height="6" fill="#ffd700"/>
  <rect x="40" y="68" width="6" height="6" fill="#ffd700"/>
  <rect x="54" y="68" width="6" height="6" fill="#ffd700"/>
  
  <!-- 袖子 -->
  <rect x="22" y="48" width="12" height="20" fill="#4b0082"/>
  <rect x="66" y="48" width="12" height="20" fill="#4b0082"/>
  
  <!-- 法杖 -->
  <rect x="82" y="24" width="4" height="56" fill="#8b4513"/>
  <rect x="80" y="20" width="8" height="10" fill="#00ced1"/>
  <rect x="82" y="22" width="4" height="6" fill="#00ffff"/>
  
  <!-- 魔法光环 -->
  <circle cx="84" cy="24" r="10" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.5"/>
  <circle cx="84" cy="24" r="14" fill="none" stroke="#00ced1" stroke-width="1" opacity="0.3"/>
  
  <!-- 魔法粒子 -->
  <rect x="14" y="30" width="4" height="4" fill="#00ffff" opacity="0.7"/>
  <rect x="18" y="24" width="3" height="3" fill="#00ced1" opacity="0.5"/>
  <rect x="12" y="50" width="3" height="3" fill="#9370db" opacity="0.6"/>
</svg>