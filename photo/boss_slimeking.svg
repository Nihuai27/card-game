<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>

  <!-- 巨型史莱姆王 - 史莱姆的王者！ -->
  <!-- 皇冠 -->
  <rect x="38" y="12" width="24" height="8" fill="#ffd700"/>
  <rect x="40" y="10" width="4" height="6" fill="#ffd700"/>
  <rect x="48" y="8" width="4" height="8" fill="#ffd700"/>
  <rect x="56" y="10" width="4" height="6" fill="#ffd700"/>
  <rect x="48" y="6" width="4" height="4" fill="#ff0000"/>

  <!-- 身体主体 -->
  <ellipse cx="50" cy="58" rx="35" ry="30" fill="#9400d3"/>
  <ellipse cx="50" cy="58" rx="28" ry="24" fill="#ba55d3"/>

  <!-- 眼睛 - 邪恶红 -->
  <rect x="38" y="48" width="8" height="8" fill="#ff0000"/>
  <rect x="54" y="48" width="8" height="8" fill="#ff0000"/>
  <rect x="40" y="50" width="3" height="3" fill="#ffff00"/>
  <rect x="56" y="50" width="3" height="3" fill="#ffff00"/>

  <!-- 嘴巴 -->
  <rect x="42" y="65" width="16" height="6" fill="#4b0082"/>
  <rect x="44" y="67" width="3" height="4" fill="#fff"/>
  <rect x="53" y="67" width="3" height="4" fill="#fff"/>

  <!-- 气泡效果 -->
  <circle cx="25" cy="40" r="5" fill="#dda0dd" opacity="0.7"/>
  <circle cx="75" cy="45" r="4" fill="#dda0dd" opacity="0.7"/>
  <circle cx="20" cy="65" r="3" fill="#dda0dd" opacity="0.6"/>
  <circle cx="80" cy="70" r="4" fill="#dda0dd" opacity="0.7"/>

  <!-- 滴落的黏液 -->
  <rect x="35" y="85" width="5" height="10" fill="#9400d3"/>
  <rect x="60" y="85" width="5" height="8" fill="#9400d3"/>

  <!-- 底部阴影 -->
  <ellipse cx="50" cy="95" rx="30" ry="4" fill="#000" opacity="0.4"/>
</svg>