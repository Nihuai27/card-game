<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  
  <!-- 史莱姆 - 黏糊糊的怪物 -->
  <!-- 身体主体 -->
  <ellipse cx="50" cy="55" rx="30" ry="25" fill="#00ff00"/>
  <ellipse cx="50" cy="55" rx="24" ry="20" fill="#32cd32"/>
  
  <!-- 眼睛 -->
  <rect x="40" y="48" width="6" height="6" fill="#000"/>
  <rect x="54" y="48" width="6" height="6" fill="#000"/>
  <rect x="42" y="50" width="2" height="2" fill="#fff"/>
  <rect x="56" y="50" width="2" height="2" fill="#fff"/>
  
  <!-- 嘴巴 -->
  <rect x="45" y="58" width="10" height="4" fill="#006400"/>
  
  <!-- 气泡效果 -->
  <circle cx="35" cy="40" r="4" fill="#90ee90" opacity="0.7"/>
  <circle cx="65" cy="45" r="3" fill="#90ee90" opacity="0.7"/>
  <circle cx="30" cy="60" r="2" fill="#90ee90" opacity="0.5"/>
  
  <!-- 滴落的黏液 -->
  <rect x="38" y="78" width="4" height="8" fill="#00ff00"/>
  <rect x="58" y="78" width="4" height="6" fill="#00ff00"/>
  
  <!-- 底部阴影 -->
  <ellipse cx="50" cy="88" rx="25" ry="5" fill="#000" opacity="0.3"/>
</svg>