<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  
  <!-- 圣骑士 - 圣光守护者 -->
  <!-- 神圣光环 -->
  <ellipse cx="50" cy="16" rx="22" ry="6" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.6"/>
  <ellipse cx="50" cy="16" rx="28" ry="8" fill="none" stroke="#ffff00" stroke-width="1" opacity="0.4"/>
  
  <!-- 头盔 -->
  <rect x="34" y="10" width="32" height="10" fill="#c0c0c0"/>
  <rect x="38" y="12" width="24" height="6" fill="#d3d3d3"/>
  <rect x="46" y="14" width="8" height="2" fill="#4169e1"/>
  
  <!-- 脸部 -->
  <rect x="38" y="20" width="24" height="14" fill="#fdbf60"/>
  <rect x="44" y="26" width="4" height="4" fill="#4169e1"/>
  <rect x="52" y="26" width="4" height="4" fill="#4169e1"/>
  <rect x="48" y="32" width="4" height="2" fill="#8b4513"/>
  
  <!-- 肩甲 -->
  <rect x="18" y="34" width="16" height="18" fill="#a9a9a9"/>
  <rect x="66" y="34" width="16" height="18" fill="#a9a9a9"/>
  <rect x="22" y="38" width="8" height="10" fill="#ffd700"/>
  <rect x="70" y="38" width="8" height="10" fill="#ffd700"/>
  
  <!-- 胸甲 -->
  <rect x="34" y="34" width="32" height="26" fill="#c0c0c0"/>
  <rect x="38" y="38" width="24" height="18" fill="#d3d3d3"/>
  
  <!-- 圣光十字 -->
  <rect x="48" y="40" width="4" height="14" fill="#4169e1"/>
  <rect x="42" y="46" width="16" height="4" fill="#4169e1"/>
  
  <!-- 手臂 -->
  <rect x="18" y="52" width="12" height="16" fill="#a9a9a9"/>
  <rect x="70" y="52" width="12" height="16" fill="#a9a9a9"/>
  
  <!-- 圣光之锤 -->
  <rect x="84" y="22" width="6" height="48" fill="#8b4513"/>
  <rect x="82" y="18" width="10" height="10" fill="#c0c0c0"/>
  <rect x="84" y="20" width="6" height="6" fill="#ffd700"/>
  
  <!-- 神圣光芒 -->
  <rect x="86" y="16" width="4" height="4" fill="#ffff00" opacity="0.8"/>
  <rect x="82" y="14" width="3" height="3" fill="#ffd700" opacity="0.6"/>
  
  <!-- 腿部 -->
  <rect x="38" y="60" width="10" height="24" fill="#4a4a6a"/>
  <rect x="52" y="60" width="10" height="24" fill="#4a4a6a"/>
  
  <!-- 战靴 -->
  <rect x="36" y="80" width="14" height="12" fill="#2f4f4f"/>
  <rect x="50" y="80" width="14" height="12" fill="#2f4f4f"/>
  <rect x="36" y="88" width="14" height="4" fill="#1a1a1a"/>
  <rect x="50" y="88" width="14" height="4" fill="#1a1a1a"/>
</svg>