<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  
  <!-- 蜘蛛 - 有毒的蜘蛛 -->
  <!-- 腹部 -->
  <ellipse cx="50" cy="55" rx="18" ry="20" fill="#4a0080"/>
  <ellipse cx="50" cy="55" rx="13" ry="15" fill="#6a00a0"/>
  
  <!-- 腹部花纹 -->
  <ellipse cx="50" cy="52" rx="6" ry="8" fill="#ff0000"/>
  <ellipse cx="50" cy="52" rx="3" ry="5" fill="#000"/>
  
  <!-- 头胸部 -->
  <ellipse cx="50" cy="32" rx="12" ry="10" fill="#2d0050"/>
  <ellipse cx="50" cy="32" rx="8" ry="7" fill="#4a0080"/>
  
  <!-- 眼睛 - 8只眼睛 -->
  <rect x="42" y="28" width="3" height="3" fill="#ff0000"/>
  <rect x="46" y="26" width="3" height="3" fill="#ff0000"/>
  <rect x="51" y="26" width="3" height="3" fill="#ff0000"/>
  <rect x="55" y="28" width="3" height="3" fill="#ff0000"/>
  <rect x="44" y="32" width="2" height="2" fill="#800000"/>
  <rect x="48" y="30" width="2" height="2" fill="#800000"/>
  <rect x="50" y="30" width="2" height="2" fill="#800000"/>
  <rect x="54" y="32" width="2" height="2" fill="#800000"/>
  
  <!-- 螯牙 -->
  <rect x="46" y="38" width="3" height="6" fill="#fff"/>
  <rect x="51" y="38" width="3" height="6" fill="#fff"/>
  
  <!-- 腿 - 左侧 -->
  <line x1="40" y1="35" x2="15" y2="20" stroke="#4a0080" stroke-width="3"/>
  <line x1="38" y1="38" x2="10" y2="30" stroke="#4a0080" stroke-width="3"/>
  <line x1="36" y1="42" x2="8" y2="45" stroke="#4a0080" stroke-width="3"/>
  <line x1="38" y1="48" x2="12" y2="55" stroke="#4a0080" stroke-width="3"/>
  
  <!-- 腿 - 右侧 -->
  <line x1="60" y1="35" x2="85" y2="20" stroke="#4a0080" stroke-width="3"/>
  <line x1="62" y1="38" x2="90" y2="30" stroke="#4a0080" stroke-width="3"/>
  <line x1="64" y1="42" x2="92" y2="45" stroke="#4a0080" stroke-width="3"/>
  <line x1="62" y1="48" x2="88" y2="55" stroke="#4a0080" stroke-width="3"/>
</svg>