<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  
  <!-- 巨鼠 - 巨大的变异老鼠 -->
  <!-- 身体 -->
  <ellipse cx="50" cy="60" rx="25" ry="18" fill="#696969"/>
  <ellipse cx="50" cy="60" rx="20" ry="14" fill="#808080"/>
  
  <!-- 头部 -->
  <ellipse cx="50" cy="38" rx="15" ry="12" fill="#696969"/>
  <ellipse cx="50" cy="38" rx="11" ry="9" fill="#808080"/>
  
  <!-- 耳朵 -->
  <ellipse cx="38" y="28" rx="6" ry="8" fill="#696969"/>
  <ellipse cx="62" y="28" rx="6" ry="8" fill="#696969"/>
  <ellipse cx="38" y="28" rx="4" ry="6" fill="#ff69b4"/>
  <ellipse cx="62" y="28" rx="4" ry="6" fill="#ff69b4"/>
  
  <!-- 眼睛 - 红色 -->
  <rect x="44" y="36" width="4" height="4" fill="#ff0000"/>
  <rect x="52" y="36" width="4" height="4" fill="#ff0000"/>
  
  <!-- 鼻子 -->
  <rect x="48" y="44" width="4" height="3" fill="#ff69b4"/>
  
  <!-- 胡须 -->
  <line x1="35" y1="40" x2="20" y2="38" stroke="#aaa" stroke-width="1"/>
  <line x1="35" y1="44" x2="20" y2="46" stroke="#aaa" stroke-width="1"/>
  <line x1="65" y1="40" x2="80" y2="38" stroke="#aaa" stroke-width="1"/>
  <line x1="65" y1="44" x2="80" y2="46" stroke="#aaa" stroke-width="1"/>
  
  <!-- 尾巴 -->
  <path d="M75 60 Q90 55 95 45" fill="none" stroke="#696969" stroke-width="4"/>
  <path d="M75 58 Q88 53 93 43" fill="none" stroke="#808080" stroke-width="2"/>
  
  <!-- 腿部 -->
  <rect x="38" y="75" width="6" height="12" fill="#696969"/>
  <rect x="56" y="75" width="6" height="12" fill="#696969"/>
  
  <!-- 爪子 -->
  <rect x="36" y="85" width="10" height="6" fill="#4a4a4a"/>
  <rect x="54" y="85" width="10" height="6" fill="#4a4a4a"/>
</svg>