<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>

  <!-- 石像鬼 - 守护古老遗迹的雕像 -->
  <!-- 身体 -->
  <rect x="32" y="45" width="36" height="35" fill="#696969"/>
  <rect x="36" y="50" width="28" height="25" fill="#808080"/>

  <!-- 石头纹理 -->
  <rect x="38" y="55" width="6" height="4" fill="#4a4a4a"/>
  <rect x="50" y="60" width="8" height="4" fill="#4a4a4a"/>
  <rect x="42" y="68" width="5" height="3" fill="#4a4a4a"/>

  <!-- 头部 -->
  <rect x="36" y="22" width="28" height="28" fill="#696969"/>
  <rect x="38" y="25" width="24" height="22" fill="#808080"/>

  <!-- 角 -->
  <polygon points="36,28 28,12 40,24" fill="#4a4a4a"/>
  <polygon points="64,28 72,12 60,24" fill="#4a4a4a"/>

  <!-- 眼睛 - 发光绿 -->
  <rect x="42" y="32" width="5" height="5" fill="#00ff00"/>
  <rect x="53" y="32" width="5" height="5" fill="#00ff00"/>
  <rect x="44" y="33" width="2" height="2" fill="#fff"/>
  <rect x="55" y="33" width="2" height="2" fill="#fff"/>

  <!-- 翅膀 - 左翼 -->
  <path d="M30 50 L10 30 L15 55 Z" fill="#4a4a4a"/>
  <path d="M28 52 L12 38 L16 52 Z" fill="#696969"/>

  <!-- 翅膀 - 右翼 -->
  <path d="M70 50 L90 30 L85 55 Z" fill="#4a4a4a"/>
  <path d="M72 52 L88 38 L84 52 Z" fill="#696969"/>

  <!-- 爪子 -->
  <rect x="24" y="60" width="10" height="12" fill="#4a4a4a"/>
  <rect x="66" y="60" width="10" height="12" fill="#4a4a4a"/>

  <!-- 腿部 -->
  <rect x="36" y="78" width="10" height="18" fill="#696969"/>
  <rect x="54" y="78" width="10" height="18" fill="#696969"/>

  <!-- 石质脚部 -->
  <rect x="34" y="93" width="14" height="6" fill="#4a4a4a"/>
  <rect x="52" y="93" width="14" height="6" fill="#4a4a4a"/>
</svg>