<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  
  <!-- 黑暗法师 - 掌握黑暗魔法的术士 -->
  <!-- 长袍 -->
  <rect x="30" y="40" width="40" height="45" fill="#2d0050"/>
  <rect x="35" y="45" width="30" height="35" fill="#4a0080"/>
  
  <!-- 头部 -->
  <rect x="38" y="22" width="24" height="22" fill="#fdbf60"/>
  <rect x="40" y="25" width="20" height="16" fill="#ffe4c4"/>
  
  <!-- 眼睛 - 紫色发光 -->
  <rect x="43" y="30" width="4" height="4" fill="#9400d3"/>
  <rect x="53" y="30" width="4" height="4" fill="#9400d3"/>
  <rect x="44" y="31" width="2" height="2" fill="#fff"/>
  <rect x="54" y="31" width="2" height="2" fill="#fff"/>
  
  <!-- 兜帽 -->
  <path d="M35 24 Q50 10 65 24 L62 32 L38 32 Z" fill="#1a0030"/>
  <rect x="35" y="30" width="30" height="6" fill="#2d0050"/>
  
  <!-- 法杖 -->
  <rect x="78" y="25" width="4" height="55" fill="#4a0080"/>
  <rect x="76" y="20" width="8" height="10" fill="#9400d3"/>
  <rect x="78" y="22" width="4" height="6" fill="#fff"/>
  
  <!-- 黑暗魔法效果 -->
  <circle cx="80" cy="22" r="10" fill="none" stroke="#9400d3" stroke-width="2" opacity="0.6"/>
  <circle cx="80" cy="22" r="14" fill="none" stroke="#4a0080" stroke-width="1" opacity="0.4"/>
  
  <!-- 魔法粒子 -->
  <rect x="15" y="30" width="4" height="4" fill="#9400d3" opacity="0.7"/>
  <rect x="20" y="25" width="3" height="3" fill="#4a0080" opacity="0.5"/>
  <rect x="12" y="50" width="3" height="3" fill="#9400d3" opacity="0.6"/>
  <rect x="85" y="60" width="4" height="4" fill="#4a0080" opacity="0.7"/>
  
  <!-- 袖子 -->
  <rect x="22" y="45" width="10" height="20" fill="#2d0050"/>
  <rect x="68" y="45" width="10" height="20" fill="#2d0050"/>
  
  <!-- 手部 -->
  <rect x="20" y="62" width="6" height="8" fill="#fdbf60"/>
  <rect x="74" y="62" width="6" height="8" fill="#fdbf60"/>
</svg>