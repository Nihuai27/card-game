<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  
  <!-- 蝙蝠 - 迅捷的飞行生物 -->
  <!-- 身体 -->
  <ellipse cx="50" cy="55" rx="12" ry="15" fill="#4a0080"/>
  <ellipse cx="50" cy="55" rx="8" ry="11" fill="#6a00a0"/>
  
  <!-- 头部 -->
  <ellipse cx="50" cy="38" rx="10" ry="10" fill="#4a0080"/>
  <ellipse cx="50" cy="38" rx="7" ry="7" fill="#6a00a0"/>
  
  <!-- 耳朵 -->
  <polygon points="42,32 38,18 46,28" fill="#4a0080"/>
  <polygon points="58,32 62,18 54,28" fill="#4a0080"/>
  
  <!-- 眼睛 - 发光红眼 -->
  <rect x="45" y="36" width="3" height="3" fill="#ff0000"/>
  <rect x="52" y="36" width="3" height="3" fill="#ff0000"/>
  <rect x="46" y="37" width="1" height="1" fill="#ffff00"/>
  <rect x="53" y="37" width="1" height="1" fill="#ffff00"/>
  
  <!-- 翅膀 - 左翼 -->
  <path d="M38 50 Q15 40 10 25 Q20 45 38 55" fill="#2d0050"/>
  <path d="M38 52 Q18 48 12 35 Q22 50 38 58" fill="#4a0080"/>
  
  <!-- 翅膀 - 右翼 -->
  <path d="M62 50 Q85 40 90 25 Q80 45 62 55" fill="#2d0050"/>
  <path d="M62 52 Q82 48 88 35 Q78 50 62 58" fill="#4a0080"/>
  
  <!-- 翅膀纹理 -->
  <line x1="25" y1="35" x2="35" y2="48" stroke="#6a00a0" stroke-width="1"/>
  <line x1="75" y1="35" x2="65" y2="48" stroke="#6a00a0" stroke-width="1"/>
  
  <!-- 脚爪 -->
  <rect x="44" y="68" width="3" height="8" fill="#4a0080"/>
  <rect x="53" y="68" width="3" height="8" fill="#4a0080"/>
  
  <!-- 獠牙 -->
  <rect x="47" y="44" width="2" height="4" fill="#fff"/>
  <rect x="51" y="44" width="2" height="4" fill="#fff"/>
</svg>