<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  
  <!-- 哥布林 - 弱小但狡猾的怪物 -->
  <!-- 身体 -->
  <rect x="35" y="45" width="30" height="30" fill="#228b22"/>
  <rect x="38" y="48" width="24" height="24" fill="#32cd32"/>
  
  <!-- 头部 -->
  <rect x="38" y="25" width="24" height="24" fill="#228b22"/>
  <rect x="40" y="28" width="20" height="18" fill="#32cd32"/>
  
  <!-- 尖耳朵 -->
  <rect x="32" y="28" width="6" height="10" fill="#228b22"/>
  <rect x="62" y="28" width="6" height="10" fill="#228b22"/>
  
  <!-- 眼睛 - 红色邪恶 -->
  <rect x="43" y="35" width="4" height="4" fill="#ff0000"/>
  <rect x="53" y="35" width="4" height="4" fill="#ff0000"/>
  
  <!-- 尖牙 -->
  <rect x="45" y="42" width="3" height="4" fill="#fff"/>
  <rect x="52" y="42" width="3" height="4" fill="#fff"/>
  
  <!-- 武器 - 生锈匕首 -->
  <rect x="20" y="50" width="4" height="20" fill="#8b4513"/>
  <rect x="18" y="48" width="8" height="4" fill="#4a4a4a"/>
  
  <!-- 手臂 -->
  <rect x="25" y="52" width="12" height="8" fill="#228b22"/>
  <rect x="63" y="52" width="12" height="8" fill="#228b22"/>
  
  <!-- 腿部 -->
  <rect x="38" y="75" width="8" height="18" fill="#228b22"/>
  <rect x="54" y="75" width="8" height="18" fill="#228b22"/>
  
  <!-- 脚部 -->
  <rect x="36" y="90" width="12" height="8" fill="#4a4a4a"/>
  <rect x="52" y="90" width="12" height="8" fill="#4a4a4a"/>
</svg>