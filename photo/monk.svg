<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  
  <!-- 武僧 - 气功大师 -->
  <!-- 光头 -->
  <rect x="44" y="10" width="12" height="12" fill="#fdbf60"/>
  
  <!-- 脸部 -->
  <rect x="46" y="16" width="8" height="8" fill="#fdbf60"/>
  <rect x="47" y="18" width="2" height="2" fill="#333"/>
  <rect x="51" y="18" width="2" height="2" fill="#333"/>
  <rect x="48" y="22" width="2" height="2" fill="#8b4513"/>
  
  <!-- 额头印记 -->
  <rect x="48" y="12" width="4" height="2" fill="#ff0000"/>
  
  <!-- 身体/僧袍 -->
  <rect x="40" y="22" width="20" height="20" fill="#ff8c00"/>
  <rect x="44" y="26" width="12" height="12" fill="#ffa500"/>
  
  <!-- 念珠 -->
  <rect x="42" y="24" width="4" height="4" fill="#8b4513"/>
  <rect x="54" y="24" width="4" height="4" fill="#8b4513"/>
  <rect x="44" y="30" width="4" height="4" fill="#8b4513"/>
  <rect x="52" y="30" width="4" height="4" fill="#8b4513"/>
  
  <!-- 拳套（空手） -->
  <rect x="22" y="32" width="6" height="8" fill="#fdbf60"/>
  <rect x="20" y="35" width="4" height="4" fill="#ff0000"/>
  <rect x="72" y="32" width="6" height="8" fill="#fdbf60"/>
  <rect x="76" y="35" width="4" height="4" fill="#ff0000"/>
  
  <!-- 气的流动效果 -->
  <rect x="14" y="26" width="4" height="4" fill="#00ffff" opacity="0.7"/>
  <rect x="18" y="22" width="2" height="2" fill="#ffffff" opacity="0.8"/>
  <rect x="82" y="28" width="4" height="4" fill="#00ffff" opacity="0.7"/>
  <rect x="86" y="24" width="2" height="2" fill="#ffffff" opacity="0.8"/>
  <rect x="14" y="48" width="2" height="2" fill="#00ffff" opacity="0.7"/>
  <rect x="84" y="50" width="2" height="2" fill="#00ffff" opacity="0.7"/>
  <rect x="10" y="36" width="3" height="3" fill="#00ced1" opacity="0.6"/>
  <rect x="88" y="40" width="3" height="3" fill="#00ced1" opacity="0.6"/>
  
  <!-- 腰带 -->
  <rect x="40" y="40" width="20" height="4" fill="#8b4513"/>
  <rect x="48" y="40" width="4" height="4" fill="#ff0000"/>
  
  <!-- 腿部/宽松裤 -->
  <rect x="42" y="44" width="6" height="26" fill="#ff8c00"/>
  <rect x="52" y="44" width="6" height="26" fill="#ff8c00"/>
  
  <!-- 赤脚 -->
  <rect x="40" y="66" width="10" height="6" fill="#fdbf60"/>
  <rect x="50" y="66" width="10" height="6" fill="#fdbf60"/>
  
  <!-- 连击暗示（残影） -->
  <rect x="28" y="30" width="3" height="3" fill="#00ffff" opacity="0.4"/>
  <rect x="30" y="28" width="2" height="2" fill="#00ffff" opacity="0.3"/>
  <rect x="68" y="32" width="3" height="3" fill="#00ffff" opacity="0.4"/>
</svg>