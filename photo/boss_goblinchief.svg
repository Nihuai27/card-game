<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>

  <!-- 哥布林酋长 - 哥布林部落的首领！ -->
  <!-- 身体 -->
  <rect x="30" y="48" width="40" height="38" fill="#228b22"/>
  <rect x="35" y="54" width="30" height="28" fill="#32cd32"/>

  <!-- 头部 -->
  <rect x="35" y="24" width="30" height="28" fill="#228b22"/>
  <rect x="38" y="28" width="24" height="20" fill="#32cd32"/>

  <!-- 尖耳朵 -->
  <rect x="28" y="28" width="8" height="12" fill="#228b22"/>
  <rect x="64" y="28" width="8" height="12" fill="#228b22"/>

  <!-- 眼睛 - 红色邪恶 -->
  <rect x="42" y="36" width="5" height="5" fill="#ff0000"/>
  <rect x="53" y="36" width="5" height="5" fill="#ff0000"/>

  <!-- 鼻子 -->
  <rect x="48" y="42" width="4" height="4" fill="#006400"/>

  <!-- 尖牙 -->
  <rect x="44" y="46" width="4" height="6" fill="#fff"/>
  <rect x="52" y="46" width="4" height="6" fill="#fff"/>

  <!-- 皇冠 -->
  <rect x="36" y="18" width="28" height="8" fill="#ffd700"/>
  <rect x="38" y="16" width="4" height="6" fill="#ffd700"/>
  <rect x="48" y="14" width="4" height="8" fill="#ffd700"/>
  <rect x="58" y="16" width="4" height="6" fill="#ffd700"/>
  <rect x="48" y="12" width="4" height="4" fill="#ff0000"/>

  <!-- 武器 - 酋长战斧 -->
  <rect x="78" y="35" width="6" height="45" fill="#8b4513"/>
  <rect x="72" y="30" width="18" height="12" fill="#c0c0c0"/>
  <rect x="75" y="33" width="12" height="6" fill="#ffd700"/>

  <!-- 披风 -->
  <rect x="22" y="50" width="10" height="30" fill="#8b0000"/>

  <!-- 手臂 -->
  <rect x="24" y="58" width="14" height="12" fill="#228b22"/>
  <rect x="62" y="58" width="14" height="12" fill="#228b22"/>

  <!-- 腿部 -->
  <rect x="36" y="85" width="10" height="12" fill="#228b22"/>
  <rect x="54" y="85" width="10" height="12" fill="#228b22"/>

  <!-- 战靴 -->
  <rect x="34" y="95" width="14" height="5" fill="#4a4a4a"/>
  <rect x="52" y="95" width="14" height="5" fill="#4a4a4a"/>
</svg>