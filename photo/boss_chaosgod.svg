<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#1a1a2e"/>

  <!-- 混沌之神 - 终极Boss！ -->
  <!-- 混沌光环 -->
  <ellipse cx="50" cy="50" rx="45" ry="40" fill="none" stroke="#9400d3" stroke-width="2" opacity="0.3"/>
  <ellipse cx="50" cy="50" rx="40" ry="35" fill="none" stroke="#ff0000" stroke-width="2" opacity="0.3"/>

  <!-- 身体 - 混沌形态 -->
  <ellipse cx="50" cy="58" rx="28" ry="25" fill="#2d0050"/>
  <ellipse cx="50" cy="58" rx="22" ry="20" fill="#4a0080"/>

  <!-- 混沌能量 -->
  <rect x="38" y="52" width="6" height="6" fill="#ff0000" opacity="0.8"/>
  <rect x="50" y="55" width="6" height="6" fill="#ffff00" opacity="0.8"/>
  <rect x="44" y="65" width="6" height="6" fill="#00ff00" opacity="0.8"/>
  <rect x="56" y="62" width="6" height="6" fill="#00ffff" opacity="0.8"/>

  <!-- 头部 -->
  <ellipse cx="50" cy="32" rx="20" ry="18" fill="#1a0030"/>
  <ellipse cx="50" cy="32" rx="15" ry="13" fill="#2d0050"/>

  <!-- 多只眼睛 - 混沌特征 -->
  <rect x="38" y="26" width="4" height="4" fill="#ff0000"/>
  <rect x="46" y="24" width="4" height="4" fill="#ffff00"/>
  <rect x="54" y="24" width="4" height="4" fill="#00ff00"/>
  <rect x="62" y="26" width="4" height="4" fill="#00ffff"/>
  <rect x="42" y="34" width="3" height="3" fill="#ff00ff"/>
  <rect x="58" y="34" width="3" height="3" fill="#ff4500"/>

  <!-- 混沌触手 -->
  <path d="M28 55 Q15 45 10 30" fill="none" stroke="#9400d3" stroke-width="4"/>
  <path d="M72 55 Q85 45 90 30" fill="none" stroke="#9400d3" stroke-width="4"/>
  <path d="M25 65 Q10 70 8 85" fill="none" stroke="#4a0080" stroke-width="4"/>
  <path d="M75 65 Q90 70 92 85" fill="none" stroke="#4a0080" stroke-width="4"/>

  <!-- 混沌之剑 -->
  <rect x="80" y="35" width="5" height="45" fill="#4a0080"/>
  <rect x="77" y="30" width="11" height="8" fill="#9400d3"/>
  <rect x="80" y="25" width="5" height="8" fill="#ff0000"/>
  <circle cx="82" cy="28" r="6" fill="none" stroke="#ffff00" stroke-width="2" opacity="0.6"/>

  <!-- 能量粒子 -->
  <rect x="12" y="40" width="4" height="4" fill="#ff0000" opacity="0.7"/>
  <rect x="15" y="60" width="3" height="3" fill="#ffff00" opacity="0.6"/>
  <rect x="85" y="45" width="4" height="4" fill="#00ff00" opacity="0.7"/>
  <rect x="88" y="65" width="3" height="3" fill="#00ffff" opacity="0.6"/>
  <rect x="48" y="88" width="4" height="4" fill="#ff00ff" opacity="0.8"/>

  <!-- 手臂 -->
  <rect x="22" y="58" width="10" height="15" fill="#2d0050"/>
  <rect x="68" y="58" width="10" height="15" fill="#2d0050"/>
</svg>